<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/jpeg" href="./profile.jpg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Personal portfolio for masteryyh"
        />
        <meta name="theme-color" content="#002b36" />
        <script>
            (function() {
                const query = window.location.search;

                const queryParams = new URLSearchParams(query);
                const p = queryParams.get('p');
                if (!p) {
                    return;
                }

                queryParams.delete('p');

                const remainingQuery = queryParams.toString();
                const newUrl = decodeURIComponent(p) +
                    (remainingQuery ? '?' + remainingQuery : '') +
                    window.location.hash;
                window.history.replaceState(null, null, newUrl);
            })();
        </script>
        <script>
            ;(() => {
                const key = "theme";
                const stored = localStorage.getItem(key);
                const pref =
                    stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
                const systemDark =
                    window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
                const resolved = pref === "system" ? (systemDark ? "dark" : "light") : pref;

                document.documentElement.dataset.theme = resolved;
                document.documentElement.style.colorScheme = resolved;

                const meta = document.querySelector('meta[name="theme-color"]');
                if (meta) meta.setAttribute("content", resolved === "dark" ? "#002b36" : "#fdf6e3");
            })();
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
        <title>masteryyh's home</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
